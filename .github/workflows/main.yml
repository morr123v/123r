name: XFCE RDP + Tailscale + n8n (Full Automation)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      USERNAME: runner
      PASSWORD: runner
      TAILSCALE_HOSTNAME: xfce-n8n-${{ github.run_id }}
      N8N_PORT: 5678
      N8N_DATA: /home/runner/n8n_data
      WORKFLOWS_REPO: https://github.com/Zie619/n8n-workflows.git

    steps:
      - uses: actions/checkout@v4

      # ---------- RDP (XFCE) ----------
      - name: Set user password and sudo
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${USERNAME}

      - name: Install XFCE Desktop + xrdp
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq xfce4 xfce4-goodies xorg dbus-x11 xrdp
          echo "startxfce4" | sudo tee /home/${USERNAME}/.xsession
          sudo chown ${USERNAME}:${USERNAME} /home/${USERNAME}/.xsession
          sudo systemctl enable --now xrdp
          sudo systemctl restart xrdp

      # ---------- Tailscale ----------
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "${TAILSCALE_HOSTNAME}"

      # ---------- Docker & n8n ----------
      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com | sudo sh
          sudo usermod -aG docker ${USERNAME}
          sudo systemctl start docker

      ### 1. Run n8n with PostgreSQL (Full Stack)
      - name: Deploy n8n with PostgreSQL
        run: |
          # Create storage directories
          mkdir -p ${N8N_DATA}/postgres_data
          sudo chown -R 1000:1000 ${N8N_DATA}
          sudo chmod -R 755 ${N8N_DATA}
          
          # Create docker-compose for n8n stack
          cat <<EOF > docker-compose-n8n.yml
          version: '3.8'
          services:
            postgres:
              image: postgres:15
              restart: unless-stopped
              environment:
                - POSTGRES_USER=n8n
                - POSTGRES_PASSWORD=n8n
                - POSTGRES_DB=n8n
              volumes:
                - ${N8N_DATA}/postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U n8n"]
                interval: 10s
                timeout: 5s
                retries: 5
            
            n8n:
              image: n8nio/n8n:latest
              restart: unless-stopped
              ports:
                - "${N8N_PORT}:5678"
              environment:
                - N8N_HOST=0.0.0.0
                - N8N_PORT=5678
                - N8N_PROTOCOL=http
                - NODE_ENV=production
                - DB_TYPE=postgresdb
                - DB_POSTGRESDB_HOST=postgres
                - DB_POSTGRESDB_PORT=5432
                - DB_POSTGRESDB_DATABASE=n8n
                - DB_POSTGRESDB_USER=n8n
                - DB_POSTGRESDB_PASSWORD=n8n
                - WEBHOOK_URL=http://localhost:${N8N_PORT}
              volumes:
                - ${N8N_DATA}/n8n_data:/home/node/.n8n
              depends_on:
                postgres:
                  condition: service_healthy
          EOF
          
          docker-compose -f docker-compose-n8n.yml up -d
          
          # Wait for n8n to be ready
          echo "Waiting for n8n to start..."
          for i in {1..30}; do
            if curl -s -f -o /dev/null http://localhost:${N8N_PORT}/healthz; then
              echo "n8n is ready"
              break
            fi
            sleep 5
          done

      ### 2. Clone the Workflow Repository (Zie619)
      - name: Clone n8n Workflows from GitHub
        run: |
          git clone ${WORKFLOWS_REPO} /tmp/n8n-workflows
          mkdir -p ${N8N_DATA}/workflows
          cp -r /tmp/n8n-workflows/* ${N8N_DATA}/workflows/
          echo "Workflows cloned to ${N8N_DATA}/workflows/"

      ### 3. Install and Use the n8n CLI Tool for Import
      - name: Install n8n CLI and Import Workflows
        run: |
          # Install n8n-cli via npm if needed (requires nodejs)
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g n8n-cli
          
          # Extract all .json workflow files from folders
          find ${N8N_DATA}/workflows -name "*.json" -type f > /tmp/workflow_files.txt
          
          # Import each workflow using n8n import:workflow command
          while IFS= read -r workflow_file; do
            echo "Importing: $workflow_file"
            n8n import:workflow --input="$workflow_file"
          done < /tmp/workflow_files.txt

      - name: Verify Workflow Import Logs
        run: |
          echo "Import completed. Check the logs for details."
          tail -20 /tmp/workflow_files.txt

      # ---------- Connection Info ----------
      - name: Connection Info
        run: |
          TS_IP=$(sudo tailscale ip -4 | head -n1 | tr -d ' ')
          echo "============================================================"
          echo "    XFCE RDP + TAILSCALE + N8N (Full Automation) READY     "
          echo "============================================================"
          echo "RDP Address: ${TS_IP}:3389"
          echo "Username: ${USERNAME}"
          echo "Password: ${PASSWORD}"
          echo ""
          echo "n8n URL: http://${TS_IP}:${N8N_PORT}"
          echo ""
          echo "Workflows are stored in: ${N8N_DATA}/workflows/"
          echo "2,000+ workflows from Zie619 are available."
          echo "============================================================"
          echo "Connect via RDP to access the desktop, or open the n8n URL."
          echo "The runner will stay alive until you cancel this workflow."
          echo "============================================================"

      # ---------- Keep Alive ----------
      - name: Keep Runner Alive
        run: while true; do sleep 600; done
