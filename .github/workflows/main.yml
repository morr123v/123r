name: XFCE RDP + Tailscale + n8n (Fixed Connectivity)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      USERNAME: runner
      PASSWORD: runner
      TAILSCALE_HOSTNAME: xfce-n8n-${{ github.run_id }}
      N8N_PORT: 5678
      N8N_DATA: /home/runner/n8n_data
      WORKFLOWS_REPO: https://github.com/Zie619/n8n-workflows.git

    steps:
      - uses: actions/checkout@v4

      - name: Set user password and sudo
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${USERNAME}

      - name: Install XFCE Desktop + xrdp
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq xfce4 xfce4-goodies xorg dbus-x11 xrdp
          echo "startxfce4" | sudo tee /home/${USERNAME}/.xsession
          sudo chown ${USERNAME}:${USERNAME} /home/${USERNAME}/.xsession
          sudo systemctl enable --now xrdp
          sudo systemctl restart xrdp

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "${TAILSCALE_HOSTNAME}"

      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com | sudo sh
          sudo usermod -aG docker ${USERNAME}
          sudo systemctl start docker

      - name: Deploy n8n with PostgreSQL using host network for direct access
        run: |
          # Create data directories
          sudo mkdir -p ${N8N_DATA}/postgres_data ${N8N_DATA}/n8n_data
          sudo chown -R 1000:1000 ${N8N_DATA}
          sudo chmod -R 755 ${N8N_DATA}

          # Run PostgreSQL container (bridge network, but accessible via hostname 'postgres')
          docker run -d \
            --name postgres \
            --restart unless-stopped \
            -e POSTGRES_USER=n8n \
            -e POSTGRES_PASSWORD=n8n \
            -e POSTGRES_DB=n8n \
            -v ${N8N_DATA}/postgres_data:/var/lib/postgresql/data \
            postgres:15

          # Wait for PostgreSQL to be ready
          for i in {1..20}; do
            if docker exec postgres pg_isready -U n8n; then
              break
            fi
            sleep 2
          done

          # Run n8n with host network (--network host) so it binds directly to host's IP
          docker run -d \
            --name n8n \
            --restart unless-stopped \
            --network host \
            -e N8N_HOST=0.0.0.0 \
            -e N8N_PORT=${N8N_PORT} \
            -e N8N_PROTOCOL=http \
            -e NODE_ENV=production \
            -e DB_TYPE=postgresdb \
            -e DB_POSTGRESDB_HOST=localhost \
            -e DB_POSTGRESDB_PORT=5432 \
            -e DB_POSTGRESDB_DATABASE=n8n \
            -e DB_POSTGRESDB_USER=n8n \
            -e DB_POSTGRESDB_PASSWORD=n8n \
            -e WEBHOOK_URL=http://localhost:${N8N_PORT} \
            -v ${N8N_DATA}/n8n_data:/home/node/.n8n \
            n8nio/n8n

          # Wait for n8n to be reachable on the host port
          echo "Waiting for n8n to respond on port ${N8N_PORT}..."
          for i in {1..40}; do
            if curl -s -f -o /dev/null http://localhost:${N8N_PORT}/healthz; then
              echo "✓ n8n is ready"
              break
            fi
            echo "Attempt $i/40: not ready yet"
            sleep 5
            if [ $i -eq 40 ]; then
              echo "ERROR: n8n did not start. Container logs:"
              docker logs n8n --tail 50
              exit 1
            fi
          done

      - name: Clone Zie619 workflows (optional)
        run: |
          git clone --depth 1 ${WORKFLOWS_REPO} /tmp/n8n-workflows
          sudo mkdir -p ${N8N_DATA}/workflows
          sudo cp -r /tmp/n8n-workflows/* ${N8N_DATA}/workflows/
          sudo chown -R ${USERNAME}:${USERNAME} ${N8N_DATA}/workflows
          echo "Workflows copied to ${N8N_DATA}/workflows/"

      - name: Connection Information
        run: |
          TS_IP=$(sudo tailscale ip -4 | head -n1 | tr -d ' ')
          echo "============================================================"
          echo "    XFCE RDP + TAILSCALE + N8N (FIXED NETWORK) READY      "
          echo "============================================================"
          echo "RDP Address: ${TS_IP}:3389"
          echo "Username: ${USERNAME}"
          echo "Password: ${PASSWORD}"
          echo ""
          echo "n8n URL: http://${TS_IP}:${N8N_PORT}"
          echo "  - First visit: Create admin account"
          echo ""
          echo "Workflows are available at: ${N8N_DATA}/workflows/"
          echo "============================================================"
          echo "If n8n is still unreachable, check Tailscale is running:"
          echo "  sudo tailscale status"
          echo "Container logs: docker logs n8n"
          echo "============================================================"

      - name: Keep Runner Alive
        run: while true; do sleep 600; done
